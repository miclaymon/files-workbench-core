# Files Workbench blacklist
# Each rule has:
#   pattern: fnmatch pattern matched against the file/directory name (not full path)
#   category: colon-separated hierarchy, e.g. "System:Windows" or "Developer:Libraries"
#   description: human-readable label
#
# Category hierarchy examples:
#   System            → all system categories
#   System:Windows    → Windows system files only
#   Developer         → all developer categories
#   Developer:Build   → build artifacts only

rules:

  # ── System – Windows ────────────────────────────────────────────────────────
  - pattern: "desktop.ini"
    category: "System:Windows"
    description: "Windows folder configuration"
  - pattern: "thumbs.db"
    category: "System:Windows"
    description: "Windows thumbnail cache"
  - pattern: "Thumbs.db"
    category: "System:Windows"
    description: "Windows thumbnail cache"
  - pattern: "$RECYCLE.BIN"
    category: "System:Windows"
    description: "Windows recycle bin"
  - pattern: "System Volume Information"
    category: "System:Windows"
    description: "Windows system volume metadata"
  - pattern: "NTUSER.DAT"
    category: "System:Windows"
    description: "Windows user registry hive"
  - pattern: "NTUSER.DAT*"
    category: "System:Windows"
    description: "Windows user registry hive files"
  - pattern: "ntuser.ini"
    category: "System:Windows"
    description: "Windows user settings"
  - pattern: "ntuser.dat.log*"
    category: "System:Windows"
    description: "Windows registry transaction logs"

  # ── System – macOS ──────────────────────────────────────────────────────────
  - pattern: ".DS_Store"
    category: "System:macOS"
    description: "macOS Finder metadata"
  - pattern: ".Spotlight-V100"
    category: "System:macOS"
    description: "macOS Spotlight search index"
  - pattern: ".Trashes"
    category: "System:macOS"
    description: "macOS Trash folder"
  - pattern: ".fseventsd"
    category: "System:macOS"
    description: "macOS FSEvents journal"
  - pattern: ".TemporaryItems"
    category: "System:macOS"
    description: "macOS temporary items"
  - pattern: ".DocumentRevisions-V100"
    category: "System:macOS"
    description: "macOS document version store"
  - pattern: ".__afs*"
    category: "System:macOS"
    description: "macOS AFS extended attributes"
  - pattern: ".AppleDouble"
    category: "System:macOS"
    description: "macOS AppleDouble resource forks"
  - pattern: ".AppleDB"
    category: "System:macOS"
    description: "macOS Apple database"
  - pattern: ".AppleDesktop"
    category: "System:macOS"
    description: "macOS Apple Desktop metadata"

  # ── System – Linux ──────────────────────────────────────────────────────────
  - pattern: ".directory"
    category: "System:Linux"
    description: "KDE folder view settings"
  - pattern: "lost+found"
    category: "System:Linux"
    description: "Filesystem recovery directory"
  - pattern: "*.swap"
    category: "System:Linux"
    description: "Linux swap file"
  - pattern: "*.swp"
    category: "System:Linux"
    description: "Linux swap file"
  - pattern: "*.swo"
    category: "System:Linux"
    description: "Linux swap file"
  - pattern: "core"
    category: "System:Linux"
    description: "Linux core dump file"
  - pattern: "core.*"
    category: "System:Linux"
    description: "Linux core dump files"
  - pattern: ".target"
    category: "System:Linux"
    description: "Linux systemd target file"
  - pattern: ".mount"
    category: "System:Linux"
    description: "Linux systemd mount unit file"
  - pattern: ".socket"  
    category: "System:Linux"
    description: "Linux systemd socket unit file"
  - pattern: ".service"
    category: "System:Linux"
    description: "Linux systemd service unit file"
  - pattern: ".timer"
    category: "System:Linux"
    description: "Linux systemd timer unit file"
  - pattern: ".slice"
    category: "System:Linux"
    description: "Linux systemd slice unit file"
  - pattern: ".scope"
    category: "System:Linux"
    description: "Linux systemd scope unit file"
  
  # ── Developer – Version Control ─────────────────────────────────────────────
  - pattern: ".git"
    category: "Developer:VersionControl"
    description: "Git repository data"
  - pattern: ".hg"
    category: "Developer:VersionControl"
    description: "Mercurial repository data"
  - pattern: ".svn"
    category: "Developer:VersionControl"
    description: "Subversion repository data"
  - pattern: ".bzr"
    category: "Developer:VersionControl"
    description: "Bazaar repository data"

  # ── Developer – Libraries / Dependencies ────────────────────────────────────
  - pattern: "node_modules"
    category: "Developer:Libraries"
    description: "Node.js package directory"
  - pattern: ".npm"
    category: "Developer:Libraries"
    description: "npm cache"
  - pattern: ".pnpm-store"
    category: "Developer:Libraries"
    description: "pnpm package store"
  - pattern: ".yarn"
    category: "Developer:Libraries"
    description: "Yarn cache and data"
  - pattern: ".venv"
    category: "Developer:Libraries"
    description: "Python virtual environment"
  - pattern: "venv"
    category: "Developer:Libraries"
    description: "Python virtual environment"
  - pattern: ".cargo"
    category: "Developer:Libraries"
    description: "Rust Cargo registry and cache"

  # ── Developer – Build Artifacts ─────────────────────────────────────────────
  - pattern: "__pycache__"
    category: "Developer:Build"
    description: "Python bytecode cache"
  - pattern: "*.pyc"
    category: "Developer:Build"
    description: "Python compiled bytecode"
  - pattern: "*.pyo"
    category: "Developer:Build"
    description: "Python optimised bytecode"
  - pattern: ".mypy_cache"
    category: "Developer:Build"
    description: "mypy type-check cache"
  - pattern: ".pytest_cache"
    category: "Developer:Build"
    description: "pytest cache"
  - pattern: ".ruff_cache"
    category: "Developer:Build"
    description: "ruff linter cache"
  - pattern: ".nuxt"
    category: "Developer:Build"
    description: "Nuxt.js build cache"
  - pattern: ".next"
    category: "Developer:Build"
    description: "Next.js build cache"
  - pattern: ".output"
    category: "Developer:Build"
    description: "Nuxt.js output directory"

  # ── Developer – Environment / IDE ───────────────────────────────────────────
  - pattern: ".vscode"
    category: "Developer:Environment"
    description: "VS Code workspace settings"
  - pattern: ".idea"
    category: "Developer:Environment"
    description: "JetBrains IDE project files"
  - pattern: "*.swp"
    category: "Developer:Environment"
    description: "Vim swap file"
  - pattern: "*.swo"
    category: "Developer:Environment"
    description: "Vim swap file"
  - pattern: ".project"
    category: "Developer:Environment"
    description: "Eclipse project file"
  - pattern: ".classpath"
    category: "Developer:Environment"
    description: "Eclipse classpath file"
  - pattern: "*.iml"
    category: "Developer:Environment"
    description: "IntelliJ IDEA module file"
